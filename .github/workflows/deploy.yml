name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          node-version: '24'

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Deploy to Cloudflare Workers
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          npx wrangler deploy 2>&1 | tee deploy.log
          URL=$(grep -oP 'https://[^\s]+\.workers\.dev' deploy.log | head -1 || true)
          if [ -z "$URL" ]; then
            URL="https://skills-sub.workers.dev"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify deployment
        if: success()
        run: |
          echo "部署成功"
          echo "URL: ${{ steps.deploy.outputs.url }}"
          echo "## Deployment Successful" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL**: [${{ steps.deploy.outputs.url }}](${{ steps.deploy.outputs.url }})" >> "$GITHUB_STEP_SUMMARY"
